<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orçamento</title>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }
#tela1 { padding:15px; }

input, select, button {
  width:100%; padding:12px; margin:6px 0;
  font-size:16px; border-radius:8px; border:1px solid #ccc;
}

.bloco {
  background:#fff; padding:10px;
  border-radius:10px; margin-bottom:10px;
}

button {
  background:#007bff; color:#fff;
  border:none; font-weight:bold;
}

#tela2 {
  display:none; padding:20px;
  background:#fff; min-height:100vh;
  text-align:center;
}

.opcao {
  background:#f9f9f9;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
}

.preco { font-size:22px; color:green; }
.reset { background:#333; }

.config {
  position:fixed;
  top:10px; right:10px;
  font-size:22px; cursor:pointer;
}

#configBox {
  display:none;
  position:fixed;
  top:60px; right:10px;
  background:#fff; padding:15px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="config" onclick="toggleConfig()">⚙️</div>

<div id="configBox">
  <label>Taxa (%)</label>
  <input type="number" id="taxaInput">
  <button onclick="salvarConfig()">Salvar</button>
</div>

<div id="tela1">

<h2>Gerar Orçamento</h2>

<select id="tipoServico">
  <option value="tela">Troca de Tela</option>
  <option value="bateria">Troca de Bateria</option>
  <option value="outro">Outro Serviço</option>
</select>

<input type="text" id="modelo" placeholder="Modelo do aparelho">

<div id="linhas"></div>

<button onclick="adicionarLinha()">➕ Adicionar</button>
<button onclick="gerar()">Gerar</button>

</div>

<div id="tela2">

<h2 id="titulo"></h2>
<div id="modeloCliente"></div>

<div id="listaOpcoes"></div>

<div id="infoTexto"></div>

<button onclick="copiar()">📲 Copiar</button>
<button class="reset" onclick="novo()">🔄 Novo</button>

</div>

<script>

let taxa = localStorage.getItem("taxa") || 12;
document.getElementById("taxaInput").value = taxa;

function toggleConfig(){
  let box = document.getElementById("configBox");
  box.style.display = box.style.display === "block" ? "none":"block";
}

function salvarConfig(){
  taxa = parseFloat(document.getElementById("taxaInput").value) || 0;
  localStorage.setItem("taxa", taxa);
  alert("Salvo!");
}

function arredondar(v){
  let f = v % 10;
  return f <= 3 ? v - f : v + (10 - f);
}

function adicionarLinha(){

  let bloco = document.createElement("div");
  bloco.className = "bloco";

  bloco.innerHTML = `
    <select>
      <option value="">Tipo (ou deixe vazio)</option>
      <option>Incell (Paralela)</option>
      <option>Incell Intermediária</option>
      <option>Incell Premium</option>
      <option>OLED</option>
      <option>OLED Intermediária</option>
      <option>OLED Premium</option>
    </select>

    <input type="text" placeholder="Nome da peça (opcional)">
    <input type="number" placeholder="Preço peça">
    <input type="number" placeholder="Mão de obra">
  `;

  document.getElementById("linhas").appendChild(bloco);
}

function gerar(){

  let modelo = document.getElementById("modelo").value;
  let tipo = document.getElementById("tipoServico").selectedOptions[0].text;

  let blocos = document.querySelectorAll(".bloco");
  let lista = document.getElementById("listaOpcoes");
  lista.innerHTML = "";

  let texto = `${tipo} - ${modelo}\n\n`;

  blocos.forEach(bloco=>{

    let select = bloco.querySelector("select").value;
    let nomeManual = bloco.querySelectorAll("input")[0].value;
    let preco = parseFloat(bloco.querySelectorAll("input")[1].value);
    let mao = parseFloat(bloco.querySelectorAll("input")[2].value);

    if (isNaN(preco)) return;

    let nome = nomeManual || select || "Serviço";

    let total = (preco + (mao || 0)) * (1 + taxa/100);
    let final = arredondar(total);

    let div = document.createElement("div");
    div.className = "opcao";
    div.innerHTML = `${nome}<br><div class="preco">R$ ${final}</div>`;
    lista.appendChild(div);

    texto += `${nome}: R$ ${final}\n`;

  });

  let info = "Garantia de 90 dias\n";

  if(tipo.includes("Tela")){
    info += "Diferença na qualidade de imagem\n";
  }else if(tipo.includes("Bateria")){
    info += "Diferença na durabilidade\n";
  }

  texto += "\n" + info;
  document.getElementById("infoTexto").innerText = info;

  document.getElementById("titulo").innerText = tipo;
  document.getElementById("modeloCliente").innerText = modelo;

  document.getElementById("tela1").style.display="none";
  document.getElementById("tela2").style.display="block";

  window.textoFinal = texto;
}

function copiar(){
  navigator.clipboard.writeText(window.textoFinal);
  alert("Copiado!");
}

function novo(){
  location.reload();
}

adicionarLinha();

</script>

</body>
</html>
