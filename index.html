<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Orçamento Assistência</title>

<style>
  body {
    font-family: Arial;
    margin: 0;
    padding: 15px;
    background: #f5f5f5;
  }

  h2 {
    text-align: center;
  }

  input, select, button {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
  }

  .bloco {
    background: #fff;
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 10px;
  }

  button {
    background: #007bff;
    color: white;
    border: none;
    font-weight: bold;
  }

  .resultado {
    background: #fff;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    white-space: pre-line;
  }

  .botoes {
    display: flex;
    gap: 10px;
  }

  .botoes button {
    flex: 1;
  }
</style>
</head>

<body>

<h2>Gerar Orçamento</h2>

<input type="text" id="modelo" placeholder="Modelo do aparelho">

<div id="linhas">

  <!-- PRIMEIRA LINHA -->
  <div class="bloco">
    <select>
      <option value="">Tipo da tela</option>
      <option>Incell (Paralela)</option>
      <option>Incell Intermediária</option>
      <option>Incell Premium</option>
      <option>OLED</option>
      <option>OLED Intermediária</option>
      <option>OLED Premium</option>
      <option value="outro">Outro (digitar)</option>
    </select>

    <input type="text" placeholder="Ou digite o nome da peça">
    <input type="tel" inputmode="decimal" placeholder="Preço da peça">
    <input type="tel" inputmode="decimal" placeholder="Mão de obra">
  </div>

</div>

<button onclick="adicionarLinha()">➕ Adicionar opção</button>

<div class="botoes">
  <button onclick="gerar()">Gerar</button>
  <button onclick="limpar()">Limpar</button>
</div>

<button onclick="copiar()">📋 Copiar Orçamento</button>

<div class="resultado" id="resultado"></div>

<script>
let textoFinal = "";

function arredondar(valor) {
  let final = valor % 10;
  return final <= 3 ? Math.round(valor - final) : Math.round(valor + (10 - final));
}

function adicionarLinha() {
  let container = document.getElementById("linhas");

  let bloco = document.createElement("div");
  bloco.className = "bloco";

  bloco.innerHTML = `
    <select>
      <option value="">Tipo da tela</option>
      <option>Incell (Paralela)</option>
      <option>Incell Intermediária</option>
      <option>Incell Premium</option>
      <option>OLED</option>
      <option>OLED Intermediária</option>
      <option>OLED Premium</option>
      <option value="outro">Outro (digitar)</option>
    </select>

    <input type="text" placeholder="Ou digite o nome da peça">
    <input type="tel" inputmode="decimal" placeholder="Preço da peça">
    <input type="tel" inputmode="decimal" placeholder="Mão de obra">
  `;

  container.appendChild(bloco);
}

function gerar() {

  let modelo = document.getElementById("modelo").value;
  let blocos = document.querySelectorAll(".bloco");

  let texto = `Troca de tela - ${modelo}\n\n`;

  blocos.forEach(bloco => {
    let select = bloco.querySelector("select").value;
    let nomeManual = bloco.querySelectorAll("input")[0].value;
    let preco = parseFloat(bloco.querySelectorAll("input")[1].value) || 0;
    let mao = parseFloat(bloco.querySelectorAll("input")[2].value) || 0;

    let nome = nomeManual || select;

    if (!nome || preco <= 0) return;

    let total = (preco + mao) * 1.12;
    let final = arredondar(total);

    texto += `${nome}: R$ ${final}\n`;
  });

  texto += `\nGarantia de 90 dias\n`;
  texto += `A diferença entre as telas é na qualidade de imagem\n`;
  texto += `Serviço realizado em média de 2 horas`;

  textoFinal = texto;
  document.getElementById("resultado").innerText = texto;
}

function copiar() {
  if (!textoFinal) {
    alert("Gere o orçamento primeiro!");
    return;
  }

  navigator.clipboard.writeText(textoFinal);
  alert("Orçamento copiado!");
}

function limpar() {
  document.getElementById("modelo").value = "";
  document.getElementById("linhas").innerHTML = "";
  adicionarLinha();
  document.getElementById("resultado").innerText = "";
  textoFinal = "";
}

// inicia com 1 linha
adicionarLinha();
</script>

</body>
</html>
