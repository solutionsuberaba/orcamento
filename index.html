<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orçamento</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

#tela1 { padding: 15px; }

input, select, button {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.bloco {
  background: #fff;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}

button {
  background: #007bff;
  color: white;
  border: none;
  font-weight: bold;
}

#tela2 {
  display: none;
  padding: 20px;
  background: #fff;
  min-height: 100vh;
  text-align: center;
}

.opcao {
  background: #f9f9f9;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 12px;
}

.preco {
  font-size: 22px;
  color: green;
}

.info {
  margin-top: 20px;
  font-size: 14px;
  color: #555;
}

.reset { background: #333; }
</style>
</head>

<body>

<!-- TELA 1 -->
<div id="tela1">

<h2>Gerar Orçamento</h2>

<select id="tipoServico" onchange="mudarTipo()">
  <option value="tela">Troca de Tela</option>
  <option value="bateria">Troca de Bateria</option>
  <option value="outro">Outro Serviço</option>
</select>

<input type="text" id="modelo" placeholder="Modelo do aparelho">

<div id="linhas"></div>

<button onclick="adicionarLinha()">➕ Adicionar opção</button>
<button onclick="gerar()">Gerar Orçamento</button>

</div>

<!-- TELA 2 -->
<div id="tela2">

<h2 id="titulo"></h2>
<div id="modeloCliente"></div>

<div id="listaOpcoes"></div>

<div class="info" id="infoTexto"></div>

<button onclick="copiar()">📲 Copiar</button>
<button class="reset" onclick="novo()">🔄 Novo</button>

</div>

<script>

let textoFinal = "";
let tipoAtual = "tela";

function arredondar(valor) {
  let final = valor % 10;
  return final <= 3 ? Math.round(valor - final) : Math.round(valor + (10 - final));
}

function mudarTipo() {
  tipoAtual = document.getElementById("tipoServico").value;
  document.getElementById("linhas").innerHTML = "";
  adicionarLinha();
}

function adicionarLinha() {

  let container = document.getElementById("linhas");
  let bloco = document.createElement("div");
  bloco.className = "bloco";

  if (tipoAtual === "tela") {
    bloco.innerHTML = `
      <select>
        <option value="">Tipo da tela</option>
        <option>Incell (Paralela)</option>
        <option>Incell Intermediária</option>
        <option>Incell Premium</option>
        <option>OLED</option>
        <option>OLED Intermediária</option>
        <option>OLED Premium</option>
      </select>
      <input type="tel" inputmode="decimal" placeholder="Preço da peça">
      <input type="tel" inputmode="decimal" placeholder="Mão de obra">
    `;
  } else {
    bloco.innerHTML = `
      <input type="text" placeholder="Nome da peça/serviço">
      <input type="tel" inputmode="decimal" placeholder="Preço da peça">
      <input type="tel" inputmode="decimal" placeholder="Mão de obra">
    `;
  }

  container.appendChild(bloco);
}

function gerar() {

  let modelo = document.getElementById("modelo").value;
  let blocos = document.querySelectorAll(".bloco");
  let lista = document.getElementById("listaOpcoes");

  lista.innerHTML = "";

  let titulo = document.getElementById("tipoServico").selectedOptions[0].text;
  let texto = `${titulo} - ${modelo}\n\n`;

  blocos.forEach(bloco => {

    let nome, preco, mao;

    if (tipoAtual === "tela") {
      nome = bloco.querySelector("select").value;
      preco = parseFloat(bloco.querySelectorAll("input")[0].value) || 0;
      mao = parseFloat(bloco.querySelectorAll("input")[1].value) || 0;
    } else {
      nome = bloco.querySelectorAll("input")[0].value;
      preco = parseFloat(bloco.querySelectorAll("input")[1].value) || 0;
      mao = parseFloat(bloco.querySelectorAll("input")[2].value) || 0;
    }

    if (!nome || preco <= 0) return;

    let total = (preco + mao) * 1.12;
    let final = arredondar(total);

    lista.innerHTML += `
      <div class="opcao">
        ${nome}<br>
        <div class="preco">R$ ${final}</div>
      </div>
    `;

    texto += `${nome}: R$ ${final}\n`;

  });

  // TEXTO INTELIGENTE
  let info = "Garantia de 90 dias<br>";

  if (tipoAtual === "tela") {
    info += "A diferença entre as telas é na qualidade de imagem<br>";
  } else if (tipoAtual === "bateria") {
    info += "A diferença entre as baterias é na qualidade e durabilidade<br>";
  } else {
    info += "Peças com variação de qualidade conforme fabricante<br>";
  }

  info += "Serviço realizado em média de 2 horas";

  texto += `\n${info.replace(/<br>/g, "\n")}`;

  textoFinal = texto;

  document.getElementById("titulo").innerText = titulo;
  document.getElementById("modeloCliente").innerText = modelo;
  document.getElementById("infoTexto").innerHTML = info;

  document.getElementById("tela1").style.display = "none";
  document.getElementById("tela2").style.display = "block";
}

function copiar() {
  navigator.clipboard.writeText(textoFinal);
  alert("Copiado!");
}

function novo() {
  location.reload();
}

adicionarLinha();

</script>

</body>
</html>
