<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Orçamento Assistência</title>

<style>
  body {
    font-family: Arial;
    margin: 0;
    padding: 15px;
    background: #f5f5f5;
  }

  h2 {
    text-align: center;
  }

  input, button {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
  }

  .bloco {
    background: #fff;
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 10px;
  }

  button {
    background: #007bff;
    color: white;
    border: none;
    font-weight: bold;
  }

  button:active {
    background: #0056b3;
  }

  .resultado {
    background: #fff;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    white-space: pre-line;
  }

  .botoes {
    display: flex;
    gap: 10px;
  }

  .botoes button {
    flex: 1;
  }
</style>
</head>

<body>

<h2>Gerar Orçamento</h2>

<input type="text" id="modelo" placeholder="Modelo do aparelho">

<div class="bloco">
  <b>Incell</b>
  <input type="number" placeholder="Preço da peça" id="incell">
  <input type="number" placeholder="Mão de obra" id="mao_incell">
</div>

<div class="bloco">
  <b>OLED Reduzida</b>
  <input type="number" placeholder="Preço da peça" id="oled1">
  <input type="number" placeholder="Mão de obra" id="mao_oled1">
</div>

<div class="bloco">
  <b>OLED Premium</b>
  <input type="number" placeholder="Preço da peça" id="oled2">
  <input type="number" placeholder="Mão de obra" id="mao_oled2">
</div>

<div class="bloco">
  <b>OLED Master</b>
  <input type="number" placeholder="Preço da peça" id="oled3">
  <input type="number" placeholder="Mão de obra" id="mao_oled3">
</div>

<div class="botoes">
  <button onclick="gerar()">Gerar</button>
  <button onclick="limpar()">Limpar</button>
</div>

<button onclick="copiar()">📋 Copiar Orçamento</button>

<div class="resultado" id="resultado"></div>

<script>
let textoFinal = "";

function gerar() {

  let modelo = document.getElementById("modelo").value;

  function calc(nome, preco, mao) {
    if (preco <= 0) return "";

    let total = (preco + mao) * 1.12;
    return `${nome}: R$ ${total.toFixed(2)}\n`;
  }

  let texto = `Troca de tela - ${modelo}\n\n`;

  texto += calc("Incell",
    parseFloat(document.getElementById("incell").value) || 0,
    parseFloat(document.getElementById("mao_incell").value) || 0
  );

  texto += calc("OLED Reduzida",
    parseFloat(document.getElementById("oled1").value) || 0,
    parseFloat(document.getElementById("mao_oled1").value) || 0
  );

  texto += calc("OLED Premium",
    parseFloat(document.getElementById("oled2").value) || 0,
    parseFloat(document.getElementById("mao_oled2").value) || 0
  );

  texto += calc("OLED Master",
    parseFloat(document.getElementById("oled3").value) || 0,
    parseFloat(document.getElementById("mao_oled3").value) || 0
  );

  texto += `\nGarantia de 90 dias\n`;
  texto += `A diferença entre as telas é na qualidade de imagem\n`;
  texto += `Serviço realizado em média de 2 horas`;

  textoFinal = texto;
  document.getElementById("resultado").innerText = texto;
}

function copiar() {
  if (!textoFinal) {
    alert("Gere o orçamento primeiro!");
    return;
  }

  navigator.clipboard.writeText(textoFinal);
  alert("Orçamento copiado!");
}

function limpar() {
  document.querySelectorAll("input").forEach(input => input.value = "");
  document.getElementById("resultado").innerText = "";
  textoFinal = "";
}
</script>

</body>
</html>
